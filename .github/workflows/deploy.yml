name: Deploy site to GitHub Pages

# Copies web/ to the gh-pages branch on every push to main.
# In repo Settings → Pages, set Source to "Deploy from a branch":
#   branch: gh-pages, folder: / (root)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish web/ to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web
          branch: gh-pages
          single-commit: true
