<link rel="icon" href="data:,">

<!-- Serif typeface, matching the inspiration site -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">

<!-- Preload the intro video so it's ready before first paint -->
<link rel="preload" as="video" href="assets/intro.mp4" type="video/mp4">

<style>
  :root {
    --ink: #232221;          /* near-black text */
    --muted: #7a7876;        /* secondary text */
    --accent: #3A8FB5;       /* epicycle blue */
    --accent-hover: #2b6f90;
  }

  * { box-sizing: border-box; }
  html { font-size: 20px; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #fff;
    color: var(--ink);
    font-family: Newsreader, Georgia, serif;
    font-weight: 400;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  @font-face {
    font-family: "Script";
    src: url("assets/GreatVibes-Regular.ttf") format("truetype");
    font-display: swap;
  }

  /* ---------- Intro overlay ---------- */
  #intro {
    position: fixed; inset: 0; z-index: 100; background: #fff;
    display: grid; place-items: center;
    transition: opacity .6s ease;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #introVid { max-width: 100%; max-height: 100%; display: block; }

  /* ---------- Brand wordmark (docks to corner) ---------- */
  #logo {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: left top;
    z-index: 110;
    font-family: "Script", cursive; color: var(--ink);
    font-size: clamp(2.5rem, 9vw, 7rem); line-height: 1; white-space: nowrap;
    text-decoration: none; opacity: 0;
    transition: opacity .5s ease, transform .85s cubic-bezier(.22,.61,.36,1);
  }
  #logo .last { color: var(--muted); }
  #logo.show { opacity: 1; }
  #logo.corner {
    left: 1.5rem; top: 1.0rem;
    transform: translate(0, 0) scale(.30);
  }

  /* ---------- Page ---------- */
  #page { opacity: 0; transition: opacity .7s ease .15s; }
  #page.show { opacity: 1; }

  main {
    max-width: 40rem;
    margin: 0 auto;
    padding: 7rem 1.5rem 4rem;
  }
  h1 {
    font-size: 1.9rem; font-weight: 600; letter-spacing: -0.01em;
    margin: 0 0 1.25rem;
  }
  p { margin: 0 0 1.1rem; }
  .muted { color: var(--muted); }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  a:hover { color: var(--accent-hover); }

  /* ---------- Contact icons (no buttons) ---------- */
  .contact {
    display: flex; gap: 1.25rem; align-items: center;
    margin-top: 1.75rem;
  }
  .contact a {
    color: var(--ink); display: inline-flex; text-decoration: none;
    transition: color .15s ease;
  }
  .contact a:hover { color: var(--accent); }
  .contact svg { width: 1.35rem; height: 1.35rem; display: block; }

  @media (prefers-reduced-motion: reduce) {
    #intro { display: none; }
    #logo { opacity: 1; left: 1.5rem; top: 1rem; transform: scale(.30); transition: none; }
    #page { opacity: 1; transition: none; }
  }
</style>
</head>
<body>
  <!-- Intro overlay (plays, then fades and hands off to the corner wordmark) -->
  <div id="intro">
    <video id="introVid" autoplay muted playsinline preload="auto"
           poster="assets/intro-poster.png">
      <source src="assets/intro.webm" type="video/webm">
      <source src="assets/intro.mp4"  type="video/mp4">
    </video>
  </div>

  <!-- Persistent brand wordmark; links home -->
  <a id="logo" href="/">Shiven <span class="last">Patel</span></a>

  <!-- The real homepage, revealed after the intro -->
  <div id="page">
    <main>

      <p>I'm a student at UCLA.</p>
      <p class="muted">I like building things for the web and exploring math through animation.</p>

      <nav class="contact">

    </main>

  <script>
    // How often the intro plays:
    //   "always"  -> every page load (current setting)
    //   "session" -> once per browser tab/session
    //   "daily"   -> once per 24h
    const PLAY_FREQUENCY = "always";

    const intro = document.getElementById("intro");
    const vid = document.getElementById("introVid");
    const logo = document.getElementById("logo");
    const page = document.getElementById("page");

    function dockAndReveal() {
      logo.classList.add("show");
      requestAnimationFrame(() => logo.classList.add("corner"));
      page.classList.add("show");
    }

    function finish() {
      intro.classList.add("hidden");
      dockAndReveal();
    }

    function shouldPlay() {
      if (PLAY_FREQUENCY === "always") return true;
      if (PLAY_FREQUENCY === "session") return !sessionStorage.getItem("introPlayed");
      if (PLAY_FREQUENCY === "daily") {
        const last = Number(localStorage.getItem("introPlayedAt") || 0);
        return Date.now() - last > 24 * 60 * 60 * 1000;
      }
      return true;
    }

    function markPlayed() {
      if (PLAY_FREQUENCY === "session") sessionStorage.setItem("introPlayed", "1");
      if (PLAY_FREQUENCY === "daily") localStorage.setItem("introPlayedAt", String(Date.now()));
    }

    if (!shouldPlay()) {
      intro.remove();
      logo.classList.add("show", "corner");
      page.classList.add("show");
    } else {
      vid.addEventListener("ended", finish);
      // Safety: if the video stalls or 'ended' never fires, hand off anyway.
      vid.addEventListener("error", finish);
      vid.play().catch(() => finish()); // autoplay blocked -> reveal page immediately
      markPlayed();
    }
  </script>
</body>
</html>
